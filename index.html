<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL // WORLD INTEL</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --jarvis-cyan: #06b6d4; --bg-black: #050505; }
        body { background: var(--bg-black); color: var(--jarvis-cyan); font-family: 'Courier New', monospace; overflow: hidden; }
        
        /* THE MAP STYLING */
        #mainView, #newsMap { width: 100%; height: 100%; border: none; background: #000; }
        .leaflet-container { background: #000 !important; }
        
        /* PULSING DOT ANIMATION */
        .pulsing-marker {
            width: 12px; height: 12px;
            background: #ff3e3e; border-radius: 50%;
            box-shadow: 0 0 0 rgba(255, 62, 62, 0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 62, 62, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 62, 62, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 62, 62, 0); }
        }

        .glass { background: rgba(0,0,0,0.95); border: 1px solid rgba(6,182,212,0.4); backdrop-filter: blur(15px); }
        .modal { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); }
        .btn-tac { border: 1px solid rgba(6,182,212,0.3); background: rgba(6,182,212,0.02); padding: 10px; font-size: 9px; }
        .btn-tac:hover { background: rgba(6,182,212,0.2); color: white; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <header class="h-14 flex items-center justify-between px-6 border-b border-cyan-500/40 bg-black z-[1001]">
        <div class="flex items-center gap-4">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
            <h1 class="text-[10px] font-black tracking-[0.3em] uppercase text-white">Sentinel_v3.7 // World_Intel</h1>
        </div>
        
        <div class="flex gap-2">
            <button onclick="openModal('news')" class="text-[9px] border border-cyan-500/50 px-2 py-1 hover:bg-cyan-500/20 uppercase font-bold">News</button>
            <button onclick="openModal('cams')" class="text-[9px] border border-cyan-500/50 px-2 py-1 hover:bg-cyan-500/20 uppercase font-bold">Cams</button>
            <select id="layerSelect" onchange="changeLayer(this.value)" class="bg-black border border-cyan-500 text-[9px] px-2 py-1 rounded text-cyan-400">
                <option value="WORLD_MAP">🌎 World_Intel_Map</option>
                <option value="AIRSPACE">✈️ Radar_Airspace</option>
                <option value="MARITIME">🚢 Vessel_Traffic</option>
                <option value="FIRE">🔥 Thermal_Heatmap</option>
            </select>
        </div>
    </header>

    <div class="flex-grow relative overflow-hidden bg-black">
        <div id="loader" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-[1000] pointer-events-none">
            <div class="w-10 h-10 border border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="text-[8px] tracking-[0.5em] animate-pulse">SYNCHRONIZING GLOBAL INTEL...</p>
        </div>

        <div id="newsMap"></div>
        
        <iframe id="mainView" class="hidden"></iframe>
    </div>

    <div id="tacticalModal" class="modal items-center justify-center p-4">
        <div class="glass w-full max-w-6xl aspect-video relative flex flex-col">
            <div class="h-10 border-b border-cyan-500/50 flex items-center justify-between px-4">
                <span id="modalTitle" class="text-[10px] font-bold tracking-widest uppercase">TACTICAL_OVERLAY</span>
                <button onclick="closeModal()" class="text-cyan-500 text-2xl hover:text-white">×</button>
            </div>
            <div id="modalContent" class="flex-grow bg-black overflow-y-auto"></div>
        </div>
    </div>

    <script>
        let map;
        const layers = {
            WORLD_MAP: "MAP",
            AIRSPACE: "https://www.radarbox.com/@37.9838,23.7275,z10",
            MARITIME: "https://www.vesselfinder.com/aismap?zoom=10&lat=37.9&lon=23.7",
            FIRE: "https://zoom.earth/maps/fire/#view=37.9,23.7,8z"
        };

        const liveNews = { "Bloomberg": "iEpJwprxDdk", "Sky News": "YDvsBbKfLPA", "Euronews": "pykpO5kQJ98", "DW News": "LuKwFajn37U", "CNBC": "9NyxcX3rhQs", "France24": "Ap-UM1O9RBU", "Al Jazeera": "gCNeDWCI0vo" };
        const liveCams = { "Athens Hub": "5p-s-1453Us", "Global Hub": "uGaxXTlz_f8", "Jerusalem": "yAl9L9mvDzY", "NYC": "rnXIjl_Rzy4" };

        function initMap() {
            // Dark Mode Tiles (CartoDB Dark Matter)
            map = L.map('newsMap', { zoomControl: false }).setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; CartoDB'
            }).addTo(map);

            fetchIntel();
        }

        async function fetchIntel() {
            try {
                // GDACS RSS Feed converted to JSON (Free proxy)
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://www.gdacs.org/xml/rss.xml');
                const data = await response.json();
                
                data.items.forEach(item => {
                    // Extract lat/long from GeoRSS or point data
                    if (item.description.includes('Lat:')) {
                        const latMatch = item.description.match(/Lat: ([-+]?[0-9]*\.?[0-9]+)/);
                        const lonMatch = item.description.match(/Lon: ([-+]?[0-9]*\.?[0-9]+)/);
                        
                        if (latMatch && lonMatch) {
                            const lat = parseFloat(latMatch[1]);
                            const lon = parseFloat(lonMatch[1]);

                            const pulseIcon = L.divIcon({
                                className: 'pulsing-marker-wrapper',
                                html: `<div class="pulsing-marker"></div>`,
                                iconSize: [12, 12]
                            });

                            const marker = L.marker([lat, lon], { icon: pulseIcon }).addTo(map);
                            marker.bindTooltip(`
                                <div class="bg-black text-cyan-400 p-2 border border-cyan-500 font-mono text-[10px]">
                                    <p class="font-bold border-b border-cyan-500/30 mb-1 uppercase">${item.title}</p>
                                    <p class="opacity-70">${item.pubDate}</p>
                                    <p class="mt-1 text-white">CLICK FOR FULL INTEL</p>
                                </div>
                            `, { sticky: true });
                            
                            marker.on('click', () => window.open(item.link, '_blank'));
                        }
                    }
                });
                document.getElementById('loader').style.opacity = '0';
            } catch (e) {
                console.error("Intel Link Failed", e);
            }
        }

        function changeLayer(val) {
            const frame = document.getElementById('mainView');
            const mapDiv = document.getElementById('newsMap');
            const loader = document.getElementById('loader');
            
            loader.style.opacity = '1';

            if (layers[val] === "MAP") {
                frame.classList.add('hidden');
                mapDiv.classList.remove('hidden');
                loader.style.opacity = '0';
            } else {
                mapDiv.classList.add('hidden');
                frame.classList.remove('hidden');
                frame.src = layers[val];
                frame.onload = () => { loader.style.opacity = '0'; };
            }
        }

        function openModal(type) {
            const modal = document.getElementById('tacticalModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            modal.style.display = 'flex';
            content.innerHTML = '';
            
            const dataSet = type === 'news' ? liveNews : liveCams;
            title.innerText = type === 'news' ? 'LIVE_INTEL_FEEDS' : 'CITY_SURVEILLANCE';

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 lg:grid-cols-4 gap-3 p-4";
            
            Object.entries(dataSet).forEach(([name, id]) => {
                const btn = document.createElement('button');
                btn.className = "btn-tac";
                btn.innerHTML = `<span class="opacity-40 block mb-1 uppercase">Source:</span> <span class="font-bold">${name}</span>`;
                btn.onclick = () => loadVideo(id);
                grid.appendChild(btn);
            });
            content.appendChild(grid);
        }

        function loadVideo(id) {
            const content = document.getElementById('modalContent');
            content.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=0&rel=0" allow="autoplay; encrypted-media; fullscreen" class="w-full h-full"></iframe>`;
            const backBtn = document.createElement('button');
            backBtn.innerText = "BACK";
            backBtn.className = "absolute top-2 left-2 bg-cyan-950 border border-cyan-500 text-[8px] px-2 py-1";
            backBtn.onclick = () => openModal(document.getElementById('modalTitle').innerText.includes('INTEL') ? 'news' : 'cams');
            content.appendChild(backBtn);
        }

        function closeModal() {
            document.getElementById('tacticalModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = '';
        }

        window.onload = initMap;
        window.onclick = (e) => { if (e.target == document.getElementById('tacticalModal')) closeModal(); }
    </script>
</body>
</html>
