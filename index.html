<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL // STABILITY_PATCH</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="//unpkg.com/globe.gl" crossorigin="anonymous"></script>
    <style>
        :root { --jarvis-cyan: #06b6d4; --bg-black: #050505; }
        body { background: var(--bg-black); color: var(--jarvis-cyan); font-family: 'Courier New', monospace; overflow: hidden; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .glass-ui { background: rgba(0,0,0,0.9); border: 1px solid rgba(6,182,212,0.3); backdrop-filter: blur(15px); }
        .grid-matrix { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px; background: #000; }
        .video-box { position: relative; width: 100%; aspect-ratio: 16/9; border: 1px solid rgba(6,182,212,0.2); }
        .video-box iframe { width: 100%; height: 100%; border: none; }
        .risk-bar { height: 4px; background: #111; overflow: hidden; }
        .risk-fill { height: 100%; background: var(--jarvis-cyan); transition: width 1s; }
        #loader { transition: opacity 0.8s ease, visibility 0.8s; }
        .tab-btn.active { border-bottom: 2px solid var(--jarvis-cyan); color: white; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <header class="h-14 flex items-center justify-between px-6 border-b border-cyan-500/40 bg-black z-[1001]">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_8px_red]"></div>
            <h1 class="text-[10px] font-black tracking-[0.4em] uppercase text-white">SENTINEL // v4.1</h1>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleView('globe')" id="btn-globe" class="tab-btn active text-[9px] px-2 py-1 uppercase font-bold">Globe</button>
            <button onclick="toggleView('grid')" id="btn-grid" class="tab-btn text-[9px] px-2 py-1 uppercase font-bold">Grid</button>
            <button onclick="toggleSidebar()" class="text-[9px] border border-cyan-500/40 px-2 py-1 uppercase font-bold">Intel</button>
        </div>
    </header>

    <div class="flex-grow relative flex overflow-hidden">
        <aside id="intel-sidebar" class="w-72 h-full glass-ui border-r border-cyan-500/20 absolute left-0 z-[50] translate-x-[-100%] transition-transform duration-300 p-4 overflow-y-auto">
            <h3 class="text-[10px] font-black border-b border-cyan-500/20 pb-2 mb-4">RISK_INDEX</h3>
            <div id="risk-list" class="space-y-4 mb-8"></div>
            <h3 class="text-[10px] font-black border-b border-cyan-500/20 pb-2 mb-4">CORRELATION_ALERTS</h3>
            <div class="text-[9px] space-y-2 opacity-70">
                <p class="text-yellow-500">[!] NEWS SPIKE: ATHENS_SECTOR</p>
                <p>[!] THERMAL ALERT: KYIV_SOUTH</p>
            </div>
        </aside>

        <main class="flex-grow relative bg-black">
            <div id="globeViz"></div>
            <div id="videoGrid" class="hidden absolute inset-0 z-10 overflow-y-auto bg-black p-2">
                <div class="grid-matrix" id="matrix-container"></div>
            </div>

            <div id="loader" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-[2000]">
                <div class="w-10 h-10 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-[8px] tracking-[0.6em] animate-pulse">UPLINKING_SENTINEL_CORE...</p>
                <button onclick="forceHideLoader()" class="mt-8 text-[8px] opacity-30 underline">FORCE_BYPASS</button>
            </div>
        </main>
    </div>

    <script>
        let world = null;
        const videoIDs = ["iEpJwprxDdk", "YDvsBbKfLPA", "pykpO5kQJ98", "LuKwFajn37U", "9NyxcX3rhQs", "Ap-UM1O9RBU", "gCNeDWCI0vo"];
        const videoNames = ["Bloomberg", "Sky News", "Euronews", "DW News", "CNBC", "France24", "Al Jazeera"];

        function initGlobe() {
            try {
                if (typeof Globe === 'undefined') throw new Error("Library not loaded");
                world = Globe()
                    (document.getElementById('globeViz'))
                    .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
                    .backgroundColor('#050505')
                    .showAtmosphere(true)
                    .atmosphereColor('#06b6d4')
                    .atmosphereDayLightOut(0.3)
                    (document.getElementById('globeViz'));
                
                world.controls().autoRotate = true;
                world.controls().autoRotateSpeed = 0.5;
            } catch (e) {
                console.error("Globe Error:", e);
                document.getElementById('globeViz').innerHTML = '<div class="flex items-center justify-center h-full text-[10px] opacity-40 uppercase">3D_GLO_ERR: Use_Video_Grid</div>';
            }
        }

        function toggleView(view) {
            const globe = document.getElementById('globeViz');
            const grid = document.getElementById('videoGrid');
            const bGlobe = document.getElementById('btn-globe');
            const bGrid = document.getElementById('btn-grid');

            if (view === 'globe') {
                globe.classList.remove('hidden');
                grid.classList.add('hidden');
                bGlobe.classList.add('active');
                bGrid.classList.remove('active');
            } else {
                globe.classList.add('hidden');
                grid.classList.remove('hidden');
                bGrid.classList.add('active');
                bGlobe.classList.remove('active');
                loadVideoGrid();
            }
        }

        function loadVideoGrid() {
            const container = document.getElementById('matrix-container');
            if (container.innerHTML !== "") return;
            videoIDs.forEach((id, i) => {
                container.innerHTML += `
                    <div class="video-box">
                        <div class="absolute top-1 left-1 bg-black/80 px-1 text-[7px] z-10 border border-cyan-500/30">${videoNames[i]}</div>
                        <iframe src="https://www.youtube.com/embed/${id}?autoplay=0&mute=1&modestbranding=1" allow="fullscreen"></iframe>
                    </div>`;
            });
        }

        function updateRisk() {
            const list = document.getElementById('risk-list');
            const regions = ["GREECE", "ISRAEL", "USA", "UKRAINE", "TAIWAN"];
            list.innerHTML = '';
            regions.forEach(r => {
                const score = Math.floor(Math.random() * 80) + 10;
                list.innerHTML += `
                    <div class="text-[9px] mb-2 font-bold uppercase flex justify-between"><span>${r}</span><span>${score}%</span></div>
                    <div class="risk-bar mb-3"><div class="risk-fill" style="width:${score}%"></div></div>
                `;
            });
        }

        function toggleSidebar() {
            const sb = document.getElementById('intel-sidebar');
            sb.style.transform = sb.style.transform === 'translateX(0%)' ? 'translateX(-100%)' : 'translateX(0%)';
        }

        function forceHideLoader() {
            const loader = document.getElementById('loader');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.visibility = 'hidden'; }, 800);
        }

        window.onload = () => {
            initGlobe();
            updateRisk();
            // Fail-safe: Hide loader even if scripts hang
            setTimeout(forceHideLoader, 3500);
        };
    </script>
</body>
</html>
