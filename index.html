<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL // WORLD MONITOR</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="//unpkg.com/globe.gl"></script>
    <style>
        :root { --jarvis-cyan: #06b6d4; --bg-black: #050505; }
        body { background: var(--bg-black); color: var(--jarvis-cyan); font-family: 'Courier New', monospace; overflow: hidden; }
        #globeViz { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .glass-ui { background: rgba(0,0,0,0.85); border: 1px solid rgba(6,182,212,0.3); backdrop-filter: blur(15px); }
        .grid-matrix { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; padding: 4px; background: #000; height: 100%; }
        .video-box { position: relative; width: 100%; aspect-ratio: 16/9; border: 1px solid rgba(6,182,212,0.2); }
        .video-box iframe { width: 100%; height: 100%; border: none; }
        .risk-bar { height: 4px; background: #111; border-radius: 2px; overflow: hidden; }
        .risk-fill { height: 100%; background: linear-gradient(90deg, #06b6d4, #ef4444); transition: width 1s; }
        #intel-sidebar { transition: transform 0.3s ease; z-index: 50; }
        .tab-btn { border-bottom: 2px solid transparent; }
        .tab-btn.active { border-color: var(--jarvis-cyan); color: white; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">

    <header class="h-14 flex items-center justify-between px-6 border-b border-cyan-500/40 bg-black z-[1001] shadow-[0_0_20px_rgba(0,0,0,1)]">
        <div class="flex items-center gap-3">
            <div class="w-2 h-2 bg-red-600 rounded-full animate-pulse shadow-[0_0_10px_red]"></div>
            <h1 class="text-[10px] font-black tracking-[0.4em] uppercase text-white">SENTINEL // WORLD_MONITOR</h1>
        </div>
        
        <div class="flex gap-2">
            <button onclick="toggleView('globe')" id="btn-globe" class="tab-btn active text-[9px] px-2 py-1 uppercase font-bold">3D_Globe</button>
            <button onclick="toggleView('grid')" id="btn-grid" class="tab-btn text-[9px] px-2 py-1 uppercase font-bold">Video_Grid</button>
            <button onclick="toggleSidebar()" class="text-[9px] border border-cyan-500/50 px-2 py-1 hover:bg-cyan-500/20 uppercase font-bold">Intel_Brief</button>
        </div>
    </header>

    <div class="flex-grow relative overflow-hidden flex">
        <aside id="intel-sidebar" class="w-72 h-full glass-ui border-r border-cyan-500/20 absolute left-0 translate-x-[-100%] md:relative md:translate-x-0 overflow-y-auto p-4 flex flex-col gap-6">
            <div>
                <h3 class="text-[10px] font-black border-b border-cyan-500/20 pb-2 mb-4 tracking-widest">COUNTRY_INSTABILITY_INDEX</h3>
                <div id="risk-list" class="space-y-4">
                    </div>
            </div>

            <div>
                <h3 class="text-[10px] font-black border-b border-cyan-500/20 pb-2 mb-4 tracking-widest">SIGNAL_CORRELATION</h3>
                <div id="correlation-feed" class="text-[9px] space-y-3 opacity-80">
                    <p class="text-yellow-400">[CONVERGENCE] Aircraft Diversion + Fire Detection detected in PERSIAN_GULF sector.</p>
                    <p class="text-red-500">[ESCALATION] News Velocity Spike + Power Outage confirmed in KYIV_GRID_04.</p>
                </div>
            </div>
        </aside>

        <main class="flex-grow relative bg-black">
            <div id="globeViz"></div>

            <div id="videoGrid" class="hidden absolute inset-0 z-10 overflow-y-auto bg-black">
                <div class="grid-matrix" id="matrix-container">
                    </div>
            </div>
            
            <div id="loader" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-[2000] pointer-events-none transition-opacity duration-700">
                <div class="w-12 h-12 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-[8px] tracking-[0.6em] animate-pulse">UPLINKING_SENTINEL_CORE...</p>
            </div>
        </main>
    </div>

    <script>
        const newsFeeds = ["Bloomberg", "Sky News", "Euronews", "DW News", "CNBC", "France24", "Al Jazeera"];
        const videoIDs = ["iEpJwprxDdk", "YDvsBbKfLPA", "pykpO5kQJ98", "LuKwFajn37U", "9NyxcX3rhQs", "Ap-UM1O9RBU", "gCNeDWCI0vo"];

        // Initialize 3D Globe
        const world = Globe()
            (document.getElementById('globeViz'))
            .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')
            .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
            .backgroundColor('#050505')
            .showAtmosphere(true)
            .atmosphereColor('#06b6d4')
            .atmosphereDayLightOut(0.4);

        // Add Mock Intel Points to Globe
        const intelPoints = [
            { lat: 37.9, lng: 23.7, size: 0.5, color: 'red', label: 'ATHENS_SECURITY_SPIKE' },
            { lat: 31.7, lng: 35.2, size: 0.8, color: 'orange', label: 'JERUSALEM_CONVERGENCE' },
            { lat: 40.7, lng: -74, size: 0.3, color: 'cyan', label: 'NYC_INTEL_NODE' }
        ];

        world.pointsData(intelPoints)
            .pointAltitude('size')
            .pointColor('color')
            .pointLabel('label');

        // Toggle Views
        function toggleView(view) {
            const globe = document.getElementById('globeViz');
            const grid = document.getElementById('videoGrid');
            const bGlobe = document.getElementById('btn-globe');
            const bGrid = document.getElementById('btn-grid');

            if (view === 'globe') {
                globe.classList.remove('hidden');
                grid.classList.add('hidden');
                bGlobe.classList.add('active');
                bGrid.classList.remove('active');
            } else {
                globe.classList.add('hidden');
                grid.classList.remove('hidden');
                bGrid.classList.add('active');
                bGlobe.classList.remove('active');
                loadVideoGrid();
            }
        }

        // Load Multi-Video Grid
        function loadVideoGrid() {
            const container = document.getElementById('matrix-container');
            if (container.children.length > 0) return; // Prevent double loading

            videoIDs.forEach((id, index) => {
                const box = document.createElement('div');
                box.className = "video-box";
                box.innerHTML = `
                    <div class="absolute top-1 left-1 bg-black/80 px-2 py-0.5 text-[7px] z-10 border border-cyan-500/30">${newsFeeds[index]}</div>
                    <iframe src="https://www.youtube.com/embed/${id}?autoplay=0&mute=1&modestbranding=1" allow="autoplay; encrypted-media; fullscreen"></iframe>
                `;
                container.appendChild(box);
            });
        }

        // Generate Instability Index
        const countries = ["GREECE", "ISRAEL", "USA", "UKRAINE", "TAIWAN", "IRAN"];
        function updateRisk() {
            const list = document.getElementById('risk-list');
            list.innerHTML = '';
            countries.forEach(c => {
                const score = Math.floor(Math.random() * 100);
                const color = score > 70 ? 'text-red-500' : (score > 40 ? 'text-yellow-500' : 'text-cyan-400');
                const item = document.createElement('div');
                item.innerHTML = `
                    <div class="flex justify-between text-[10px] font-bold mb-1">
                        <span>${c}</span>
                        <span class="${color}">${score}/100</span>
                    </div>
                    <div class="risk-bar"><div class="risk-fill" style="width: ${score}%"></div></div>
                `;
                list.appendChild(item);
            });
        }

        function toggleSidebar() {
            const sb = document.getElementById('intel-sidebar');
            sb.style.transform = sb.style.transform === 'translateX(0%)' ? 'translateX(-100%)' : 'translateX(0%)';
        }

        // Initial Load
        window.onload = () => {
            updateRisk();
            setInterval(updateRisk, 10000); // Update index every 10s
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; }, 2000);
        };
    </script>
</body>
</html>
