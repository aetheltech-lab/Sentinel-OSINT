<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTINEL // ORBITAL COMMAND</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --jarvis-cyan: #06b6d4; --bg-black: #050505; }
        body { background: var(--bg-black); color: var(--jarvis-cyan); font-family: 'Courier New', monospace; overflow: hidden; }
        .glass { background: rgba(0,0,0,0.98); border: 1px solid rgba(6,182,212,0.4); backdrop-filter: blur(20px); }
        .grid-bg { background-image: radial-gradient(rgba(6,182,212,0.15) 1px, transparent 0); background-size: 25px 25px; }
        iframe { border: none; width: 100%; height: 100%; pointer-events: auto; background: #000; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); }
        .btn-tac { border: 1px solid rgba(6,182,212,0.3); background: rgba(6,182,212,0.02); padding: 12px; font-size: 10px; transition: 0.2s; text-align: left; }
        .btn-tac:hover { background: rgba(6,182,212,0.3); border-color: var(--jarvis-cyan); color: white; box-shadow: 0 0 15px rgba(6,182,212,0.2); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; box-shadow: 0 0 8px currentColor; }
    </style>
</head>
<body class="h-screen w-screen flex flex-col grid-bg">

    <header class="h-14 flex items-center justify-between px-6 border-b border-cyan-500/40 bg-black z-50">
        <div class="flex items-center gap-4">
            <div class="status-dot bg-red-600 animate-pulse shadow-[0_0_10px_red]"></div>
            <h1 class="text-[10px] font-black tracking-[0.3em] uppercase text-white">Sentinel_v3.5 // Orbital_Ops</h1>
        </div>
        
        <div class="flex gap-3">
            <button onclick="openModal('news')" class="text-[9px] border border-cyan-500/50 px-3 py-1.5 hover:bg-cyan-500/20 uppercase font-black tracking-widest">Live_News</button>
            <button onclick="openModal('cams')" class="text-[9px] border border-cyan-500/50 px-3 py-1.5 hover:bg-cyan-500/20 uppercase font-black tracking-widest">City_Cams</button>
            <select id="layerSelect" onchange="changeLayer(this.value)" class="bg-black border border-cyan-500 text-[9px] px-2 py-1 rounded text-cyan-400 outline-none uppercase font-bold">
                <option value="SATELLITE">🛰️ Starlink_Orbital</option>
                <option value="AIRSPACE">✈️ Radar_Airspace</option>
                <option value="MARITIME">🚢 Vessel_Traffic</option>
                <option value="FIRE">🔥 Thermal_Heatmap</option>
            </select>
        </div>
    </header>

    <div class="flex flex-grow overflow-hidden relative">
        <aside class="w-16 flex flex-col items-center py-6 gap-8 border-r border-cyan-500/20 bg-black/80">
            <div class="opacity-30 hover:opacity-100 transition-opacity cursor-crosshair text-[8px] rotate-[-90deg]">STEL_ID</div>
            <div class="opacity-30 hover:opacity-100 transition-opacity cursor-crosshair text-[8px] rotate-[-90deg]">OSINT</div>
            <div class="opacity-30 hover:opacity-100 transition-opacity cursor-crosshair text-[8px] rotate-[-90deg]">TACTICAL</div>
        </aside>

        <main class="flex-grow relative overflow-hidden bg-black">
            <div id="loader" class="absolute inset-0 bg-black flex flex-col items-center justify-center z-40 transition-opacity duration-500 pointer-events-none">
                <div class="w-10 h-10 border border-cyan-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-[8px] tracking-[0.5em] animate-pulse">UPLINKING_TO_SATELLITE_GRID...</p>
            </div>
            <iframe id="mainView" src="https://satellitemap.space/" allow="geolocation; fullscreen"></iframe>
        </main>
    </div>

    <div id="tacticalModal" class="modal items-center justify-center p-4">
        <div class="glass w-full max-w-6xl aspect-video relative flex flex-col overflow-hidden">
            <div class="h-12 border-b border-cyan-500/50 flex items-center justify-between px-6 bg-black/50">
                <div class="flex items-center gap-3">
                    <div class="status-dot bg-cyan-400 animate-ping"></div>
                    <span id="modalTitle" class="text-[10px] font-black tracking-[0.2em] uppercase">Tactical_Overlay</span>
                </div>
                <button onclick="closeModal()" class="text-cyan-500 text-3xl font-thin hover:text-white transition-colors">×</button>
            </div>
            <div id="modalContent" class="flex-grow bg-black relative"></div>
        </div>
    </div>

    <script>
        const layers = {
            SATELLITE: "https://satellitemap.space/",
            AIRSPACE: "https://www.radarbox.com/@37.9838,23.7275,z10",
            MARITIME: "https://www.vesselfinder.com/aismap?zoom=10&lat=37.9&lon=23.7",
            FIRE: "https://zoom.earth/maps/fire/#view=37.9,23.7,8z"
        };

        const liveNews = {
            "Bloomberg": "iEpJwprxDdk",
            "Sky News": "YDvsBbKfLPA",
            "Euronews": "pykpO5kQJ98",
            "DW News": "LuKwFajn37U",
            "CNBC": "9NyxcX3rhQs",
            "France24": "Ap-UM1O9RBU",
            "Al Jazeera": "gCNeDWCI0vo"
        };

        const liveCams = {
            "Athens & Greece Hub": "5p-s-1453Us",
            "USA/UK Global Hub": "uGaxXTlz_f8",
            "Jerusalem (Western Wall)": "yAl9L9mvDzY",
            "NYC (Times Square)": "rnXIjl_Rzy4",
            "Washington (White House)": "Fu8vYoIkaeM",
            "Paris (Eiffel Tower)": "OzYp4NRZlwQ",
            "London (Abbey Road)": "M3EYAY2MftI"
        };

        function changeLayer(val) {
            const loader = document.getElementById('loader');
            const frame = document.getElementById('mainView');
            loader.style.opacity = '1';
            frame.src = layers[val];
            frame.onload = () => { setTimeout(() => { loader.style.opacity = '0'; }, 1200); };
        }

        function openModal(type) {
            const modal = document.getElementById('tacticalModal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');
            modal.style.display = 'flex';
            content.innerHTML = '';
            
            const dataSet = type === 'news' ? liveNews : liveCams;
            title.innerText = type === 'news' ? 'Live_Intel_Feeds' : 'Tactical_Surveillance_Cams';

            const grid = document.createElement('div');
            grid.className = "grid grid-cols-2 lg:grid-cols-4 gap-3 p-6";
            
            Object.entries(dataSet).forEach(([name, id]) => {
                const btn = document.createElement('button');
                btn.className = "btn-tac";
                btn.innerHTML = `<span class="opacity-40 block mb-1 uppercase text-[8px]">Source:</span> <span class="font-bold tracking-tight">${name}</span>`;
                btn.onclick = () => loadVideo(id);
                grid.appendChild(btn);
            });
            content.appendChild(grid);
        }

        function loadVideo(id) {
            const content = document.getElementById('modalContent');
            content.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1&mute=0&rel=0&modestbranding=1" allow="autoplay; encrypted-media; fullscreen" class="w-full h-full"></iframe>`;
            
            const backBtn = document.createElement('button');
            backBtn.innerText = "RETURN TO GRID";
            backBtn.className = "absolute top-4 left-4 glass border border-cyan-500/50 text-[8px] px-3 py-1 font-bold hover:bg-cyan-500 hover:text-black";
            backBtn.onclick = () => { openModal(document.getElementById('modalTitle').innerText.includes('INTEL') ? 'news' : 'cams'); };
            content.appendChild(backBtn);
        }

        function closeModal() {
            document.getElementById('tacticalModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = '';
        }

        window.onclick = (e) => { if (e.target == document.getElementById('tacticalModal')) closeModal(); }
    </script>
</body>
</html>
